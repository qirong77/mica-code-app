<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Mica Code</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; worker-src 'self' blob:"
    />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">
            <span class="brand-mark">M</span>
            <div>
              <div class="brand-title">Mica Code</div>
              <div class="brand-subtitle">Terminal Sessions</div>
            </div>
          </div>
          <div class="sidebar-actions">
            <button id="btn-new-folder" class="icon-btn" title="新建文件夹">📁</button>
            <button id="btn-new-terminal" class="icon-btn" title="新建终端">＋</button>
          </div>
        </div>
        <div id="session-tree" class="session-tree"></div>
        <div class="sidebar-footer">
          <div class="hint">双击重命名 · 拖拽排序</div>
          <div class="hint">右键更多操作</div>
        </div>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div id="active-title" class="active-title">未选择终端</div>
          <div class="workspace-actions">
            <button id="btn-clear" class="text-btn" title="清屏">清屏</button>
          </div>
        </header>
        <section id="terminal-host" class="terminal-host"></section>
        <div id="empty-state" class="empty-state">
          选择或新建一个终端会话
        </div>
      </main>
    </div>

    <script type="module" src="./src/renderer.js"></script>
  </body>
</html>
